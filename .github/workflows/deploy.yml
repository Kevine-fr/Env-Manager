name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Production VPS
        run: |
          ssh ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} bash -s << 'DEPLOY'
          set -e

          REPO_URL="git@github.com:Kevine-fr/Env-Manager.git"

          echo "Preparation du depot..."
          mkdir -p ${{ secrets.PATH_DIR }}
          cd ${{ secrets.PATH_DIR }}

          if [ ! -d .git ]; then
            echo "Premier deploiement : initialisation du depot git..."
            git init -q
            git remote add origin "$REPO_URL" 2>/dev/null || git remote set-url origin "$REPO_URL"
          else
            git remote set-url origin "$REPO_URL"
          fi

          echo "Mise a jour du code..."
          git fetch origin --prune
          git reset --hard origin/main

          echo "Calcul de la version..."
          BASE_VERSION=$(tr -d '[:space:]' < VERSION 2>/dev/null || true)
          [ -n "$BASE_VERSION" ] || BASE_VERSION="1.0"
          PATCH=$(git rev-list --count HEAD)
          APP_VERSION="${BASE_VERSION}.${PATCH}"
          APP_COMMIT=$(git rev-parse --short HEAD)
          echo "Version : ${APP_VERSION} (${APP_COMMIT})"

          echo "Generation du .env..."

          cat > .env << 'ENVEOF'

          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }}

          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRE_HOURS=12

          DEPLOY_ROOT=${{ secrets.DEPLOY_ROOT }}

          SCAN_INTERVAL_MINUTES=${{ secrets.SCAN_INTERVAL_MINUTES }}
          SCAN_ON_STARTUP=true

          ENV_GLOBS=.env,.env.*
          ENV_EXCLUDE_SUFFIXES=.example,.sample,.dist,.template
          EXCLUDE_DIRS=node_modules,vendor,.git,dist,build,__pycache__,.venv,venv,storage

          HOST=0.0.0.0
          PORT=8000

          GIT_SSH_KEY_PATH=${{ secrets.GIT_SSH_KEY_PATH }}
          GIT_SSH_KEY_HOST=${{ secrets.GIT_SSH_KEY_HOST }}

          INFRA_AUTO_PUSH=${{ secrets.INFRA_AUTO_PUSH }}
          INFRA_ENABLED=${{ secrets.INFRA_ENABLED }}
          INFRA_REPO_PATH=${{ secrets.INFRA_REPO_PATH }}

          CERTBOT_WWW_HOST=${{ secrets.CERTBOT_WWW_HOST }}
          CERTBOT_CONF_HOST=${{ secrets.CERTBOT_CONF_HOST }}

          ENVEOF

          # Version calculee plus haut : ajoutee hors du heredoc (qui est quote
          # et n'expanserait pas les variables shell).
          {
            echo "APP_VERSION=${APP_VERSION}"
            echo "APP_COMMIT=${APP_COMMIT}"
          } >> .env

          echo "Demarrage des conteneurs..."
          docker compose build --no-cache env-manager
          docker compose up -d --build

          docker exec nginx nginx -s reload || true

          echo "Deploiement termine."
          DEPLOY

      - name: Resume
        run: |
          echo "## Production deployee" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://${{ secrets.APP_DOMAIN }} |" >> $GITHUB_STEP_SUMMARY