<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ENV Manager · Console des secrets</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <!-- =================== ÉCRAN DE CONNEXION =================== -->
  <div id="login-view" class="login-view">
    <div class="login-grid"></div>
    <div class="login-card">
      <div class="brand">
        <div class="brand-mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
        </div>
        <div>
          <h1>ENV&nbsp;Manager</h1>
          <p>Console des secrets · VPS</p>
        </div>
      </div>

      <form id="login-form" class="login-form" autocomplete="off">
        <label class="field">
          <span>Identifiant</span>
          <input id="login-username" type="text" value="admin" autocomplete="username" />
        </label>
        <label class="field">
          <span>Mot de passe</span>
          <input id="login-password" type="password" placeholder="••••••••••••" autocomplete="current-password" required />
        </label>
        <div id="login-error" class="login-error" hidden></div>
        <button type="submit" class="btn btn-primary btn-block" id="login-btn">
          <span class="btn-label">Déverrouiller</span>
        </button>
      </form>
      <p class="login-foot">Accès réservé · administrateur uniquement</p>
    </div>
  </div>

  <!-- =================== APPLICATION =================== -->
  <div id="app-view" class="app-view" hidden>
    <header class="topbar">
      <div class="topbar-brand">
        <div class="brand-mark sm">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
        </div>
        <span class="topbar-title">ENV&nbsp;Manager</span>
        <span class="dot-sep"></span>
        <span id="scan-meta" class="scan-meta">—</span>
      </div>

      <div class="topbar-actions">
        <div class="search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="7" /><path d="m21 21-4.3-4.3" />
          </svg>
          <input id="search-input" type="text" placeholder="Rechercher projet ou clé…" />
        </div>
        <button id="rescan-btn" class="btn btn-ghost" title="Relancer un scan maintenant">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 1 1-2.64-6.36" /><path d="M21 3v5h-5" />
          </svg>
          <span>Scanner</span>
        </button>
        <button id="logout-btn" class="btn btn-ghost" title="Se déconnecter">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" /><path d="m16 17 5-5-5-5" /><path d="M21 12H9" />
          </svg>
        </button>
      </div>
    </header>

    <div class="layout">
      <!-- Liste des projets -->
      <aside class="sidebar">
        <div class="sidebar-head">
          <span>Projets</span>
          <span id="project-count" class="pill">0</span>
        </div>
        <nav id="project-list" class="project-list"></nav>
      </aside>

      <!-- Détail d'un projet -->
      <main class="content" id="content">
        <div class="empty-state" id="empty-state">
          <div class="empty-glyph">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h6l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z" />
            </svg>
          </div>
          <p>Sélectionnez un projet pour afficher ses variables.</p>
        </div>
      </main>
    </div>
  </div>

  <!-- =================== MODALE D'ÉDITION / AJOUT =================== -->
  <div id="edit-modal" class="modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-card">
      <h3 id="edit-title">Modifier la variable</h3>
      <p id="edit-subtitle" class="modal-sub"></p>
      <label class="field">
        <span>Clé</span>
        <input id="edit-key" type="text" class="mono" spellcheck="false" />
      </label>
      <label class="field">
        <span>Valeur</span>
        <textarea id="edit-value" rows="3" class="mono" spellcheck="false"></textarea>
      </label>
      <div class="modal-actions">
        <button class="btn btn-ghost" data-close>Annuler</button>
        <button class="btn btn-primary" id="edit-save">Enregistrer</button>
      </div>
    </div>
  </div>

  <!-- =================== MODALE DE SUPPRESSION =================== -->
  <div id="delete-modal" class="modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-card">
      <h3 class="danger-title">Supprimer la variable</h3>
      <p class="modal-sub">
        Cette action supprime définitivement <code id="delete-key" class="mono"></code>
        du fichier <code id="delete-file" class="mono"></code> sur le VPS.
      </p>
      <div class="modal-actions">
        <button class="btn btn-ghost" data-close>Annuler</button>
        <button class="btn btn-danger" id="delete-confirm">Supprimer définitivement</button>
      </div>
    </div>
  </div>

  <div id="toast-stack" class="toast-stack"></div>

  <script src="/app.js"></script>
</body>
</html>
